name: Monthly Fee Scrape

# Runs on the 1st of every month. Also runnable manually (workflow_dispatch)
# for testing or ad-hoc re-checks. This does NOT touch AyranAI's production
# database — it only produces a review report as a commit + PR-able diff for
# a human to read. See ARCHITECTURE.md for why this is deliberately
# human-in-the-loop rather than auto-applying.
on:
  schedule:
    - cron: '0 6 1 * *'  # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

# Explicitly grants GITHUB_TOKEN write access for the "Commit updated
# snapshot + review report" step's `git push`. Needed regardless of the
# repo-level Settings -> Actions -> "Read and write permissions" default —
# that setting alone was still hitting a 403; declaring it here at the
# workflow level is the more robust fix.
permissions:
  contents: write

jobs:
  scrape-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Only scrapers/koc.py uses Playwright (its WAF blocks plain
      # requests.get() even with a browser User-Agent, but allows a real
      # browser engine through -- see that file's module docstring). --with-
      # deps also installs the system libraries (libnss3 etc.) Chromium
      # needs on the bare ubuntu-latest runner image, not just the browser
      # binary itself -- `playwright install chromium` alone fails at
      # launch time on a fresh runner without them.
      - name: Install Playwright's Chromium browser (for scrapers/koc.py)
        run: playwright install --with-deps chromium

      - name: Run test suite first (fail fast if a parser is broken)
        run: pytest tests/ -v

      - name: Run the scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_scrape.py

      - name: Commit updated snapshot + review report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: monthly fee scrape $(date -u +%Y-%m-%d)"
          git push
